{% extends "base.html" %}
{% block title %}Log in · Cricket Club{% endblock %}
{% block content %}
<div class="card narrow reveal">
  <h1>Log in</h1>
  <form method="post" action="{{ url_for('auth.login') }}">
    <label>Email
      <input type="email" name="email" value="{{ email }}" required autofocus>
    </label>
    <label>Password
      <span class="pw-wrap">
        <input type="password" name="password" required>
        <button type="button" class="pw-toggle" data-pw-toggle aria-label="Show password" aria-pressed="false">Show</button>
      </span>
    </label>
    <button type="submit" class="btn btn-primary">Log in</button>
  </form>
  <p class="muted">No account? <a href="{{ url_for('auth.register') }}">Register here</a>.</p>
</div>
{% endblock %}
